services:
  - type: web
    name: mindos-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindos-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 3000
    healthCheckPath: /healthz

databases:
  - name: mindos-db
    plan: starter
    postgresMajorVersion: 17
    ipAllowList: []
